{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit Profile - EcoWaste{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="avatar-lg mx-auto mb-3">{{ user.username|first|upper }}</div>
                        <h3 class="fw-bold">Edit Profile</h3>
                        <p class="text-muted">Update your personal information</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success flex-fill">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                            <a href="{% url 'user_dashboard' %}" class="btn btn-outline-secondary flex-fill">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
