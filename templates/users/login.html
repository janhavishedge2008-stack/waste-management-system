{% extends 'base.html' %}
{% block title %}Login - EcoWaste{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow rounded-4 overflow-hidden">
                <div class="card-header-gradient p-4 text-center text-white">
                    <i class="fas fa-recycle fa-3x mb-2 opacity-75"></i>
                    <h3 class="fw-bold mb-0">Welcome Back</h3>
                    <p class="opacity-75 mb-0 small">Sign in to your EcoWaste account</p>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" name="username" class="form-control border-start-0" placeholder="Enter username" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" name="password" id="passwordInput" class="form-control border-start-0" placeholder="Enter password" required>
                                <button type="button" class="btn btn-outline-secondary border-start-0" onclick="togglePwd()">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 btn-lg fw-bold">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>
                    <hr class="my-4">
                    <p class="text-center text-muted mb-3">Don't have an account?</p>
                    <div class="d-grid gap-2">
                        <a href="{% url 'register_user' %}" class="btn btn-outline-success">
                            <i class="fas fa-user-plus me-2"></i>Register as User
                        </a>
                        <a href="{% url 'register_company' %}" class="btn btn-outline-primary">
                            <i class="fas fa-building me-2"></i>Register as Company
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePwd() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}
</script>
{% endblock %}
